<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>낙원 장비 시너지 추천기</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
<div class="container">
    <h1>⚔️ 낙원 장비 시너지 추천기</h1>

    <div class="main-layout">
        <!-- 입력 영역 -->
        <div class="input-panel card">
            <div class="form-group">
                <label>딜러 타입</label>
                <select id="dmgType">
                    <option value="physical">물리 딜러</option>
                    <option value="magical">마법 딜러</option>
                    <option value="hybrid">하이브리드</option>
                </select>
            </div>

            <div class="form-group">
                <label>속성</label>
                <select id="elementType">
                    <option value="none">무속성</option>
                    <option value="elemental">속성</option>
                    <option value="dark">암속성</option>
                </select>
            </div>

            <button onclick="calculate()">✨ 추천 세팅 보기</button>
        </div>

        <!-- 결과 영역 -->
        <div id="resultBox" class="result-box card">
            <h2 class="highlight">추천 세팅</h2>
            <div class="grid-container" id="equipGrid"></div>
            <div id="resultDesc" class="desc"></div>
        </div>
    </div>
</div>
</body>
</html>
