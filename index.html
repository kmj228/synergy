<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>낙원 장비 시너지 추천기</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<div class="header">
  <h1>⚔ 낙원 장비 시너지 추천기</h1>
  <div class="header-divider"><span>Lost Ark</span></div>
</div>

<div class="layout">

  <!-- 입력 패널 -->
  <div class="input-panel card">
    <div class="panel-title">캐릭터 설정</div>

    <div class="form-group">
      <label for="dmgType">딜러 타입</label>
      <select id="dmgType">
        <option value="physical">물리 딜러</option>
        <option value="magical">마법 딜러</option>
        <option value="hybrid">하이브리드</option>
      </select>
    </div>

    <div class="form-group">
      <label for="elementType">속성</label>
      <select id="elementType">
        <option value="none">무속성</option>
        <option value="elemental">속성</option>
        <option value="dark">암속성</option>
      </select>
    </div>

    <div class="input-hint">선택 시 바로 추천 세팅이 표시됩니다</div>
  </div>

  <!-- 결과 패널 -->
  <div id="resultPanel" class="result-panel card">
    <div class="result-header">
      <h2>추천 세팅</h2>
      <span class="result-badge" id="resultLabel"></span>
    </div>
    <div class="equip-grid" id="equipGrid"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="legend" id="setLegend"></div>
  </div>

</div>

<script src="script.js?v=3"></script>
</body>
</html>
